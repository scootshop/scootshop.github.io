<!-- partials/mobile-menu.html -->
<style>
  /* =========================
     MOBILE MENU (self-contained)
     ========================= */

  :root{
    /* Fallbacks por si tu página no define variables globales */
    --mm-ink: var(--ink, #111315);
    --mm-muted: var(--muted, #676b73);
    --mm-line: var(--line, #E6E9EF);
    --mm-bg: #ffffff;

    /* ✅ Forzar tipografía (usa tu --ui si existe) */
    --mm-font: var(
      --ui,
      'Plus Jakarta Sans',
      ui-sans-serif,
      system-ui,
      -apple-system,
      "Segoe UI",
      Roboto,
      Helvetica,
      Arial,
      "Noto Sans"
    );
  }

  /* Backdrop */
  .mm-backdrop{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.45);
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:opacity .22s ease-out;
  }
  .mm-backdrop.show{
    opacity:1;
    pointer-events:auto;
  }

  /* Panel */
  .mm-panel{
    position:fixed;
    inset:0 0 0 auto;
    width:min(360px,92vw);
    background:var(--mm-bg);
    border-left:1px solid var(--mm-line);
    z-index:101;
    transform:translateX(100%);
    transition:transform .24s ease-out;
    display:flex;
    flex-direction:column;
    box-shadow:-18px 0 40px rgba(0,0,0,.12);

    /* ✅ tipografía consistente */
    font-family: var(--mm-font);
  }
  .mm-panel.open{ transform:translateX(0); }

  /* ✅ Asegura tipografía en elementos de texto (sin tocar <i> de FontAwesome) */
  .mm-panel :is(a, button, span, div, p){
    font-family: var(--mm-font);
  }

  /* Header */
  .mm-head{
    padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    border-bottom:1px solid var(--mm-line);
    background:#fff;
  }
  .mm-brand{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }
  .mm-brand img{
    height:34px;
    width:auto;
    border-radius:10px;
    border:1px solid rgba(0,0,0,.06);
    background:#fff;
    padding:3px;
  }
  .mm-brand-text{
    display:flex;
    flex-direction:column;
    line-height:1.1;
    min-width:0;
  }
  .mm-brand-name{
    font-weight:900;
    font-size:.92rem;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--mm-ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .mm-brand-tag{
    font-size:.78rem;
    color:var(--mm-muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .mm-close{
    width:40px;
    height:40px;
    border-radius:12px;
    border:1px solid var(--mm-line);
    background:transparent;
    cursor:pointer;
    display:grid;
    place-items:center;
    color:var(--mm-ink);
  }
  .mm-close:active{ transform:scale(.98); }

  /* Content */
  .mm-content{
    padding:8px 0 16px;
    overflow:auto;
    flex:1;
  }
  .mm-links-group{
    display:flex;
    flex-direction:column;
  }

  /* Links (minimal, SOLO texto) */
  .mm-link{
    appearance:none;
    -webkit-appearance:none;
    width:100%;
    text-align:left;
    border:0;
    background:transparent;
    cursor:pointer;

    padding:14px 16px;
    border-bottom:1px solid #eef0f4;

    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.06em;
    font-size:.92rem;
    color:var(--mm-ink);

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .mm-link:hover{ background:rgba(0,0,0,.03); }

  /* Toggle icon (Productos) */
  .mm-link--toggle .mm-link-chevron{
    color:#c0c4cc;
    font-size:.92rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    transition:transform .18s ease;
  }
  .mm-link--toggle.is-open .mm-link-chevron{
    transform:rotate(180deg);
  }

  /* Submenu */
  .mm-sub{
    border-bottom:1px solid #eef0f4;
    background:#fafafa;
    padding:6px 0;
  }
  .mm-sub-link{
    display:block;
    padding:11px 16px 11px 32px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:.84rem;
    color:var(--mm-ink);
    border-top:1px solid rgba(0,0,0,.04);
  }
  .mm-sub-link:first-child{ border-top:0; }
  .mm-sub-link:hover{ background:rgba(0,0,0,.03); }

  /* Footer (solo iconos) */
  .mm-foot{
    padding:12px 16px calc(env(safe-area-inset-bottom,0px) + 14px);
    border-top:1px solid var(--mm-line);
    background:#fff;
  }
  .mm-icons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
  }
  .mm-icons a{
    width:42px;
    height:42px;
    border-radius:999px;
    border:1px solid #e5e7eb;
    background:transparent;
    display:grid;
    place-items:center;
    font-size:18px;
    color:var(--mm-ink);
    transition:background .12s ease, transform .12s ease;
  }
  .mm-icons a:hover{
    background:#f3f4f6;
    transform:translateY(-1px);
  }
</style>

<!-- Backdrop -->
