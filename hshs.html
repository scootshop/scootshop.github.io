<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prueba PayPal — 1€</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#fff; color:#111; margin:0; padding:24px;}
    .wrap{max-width:520px; margin:0 auto; border:1px solid #e5e7eb; border-radius:16px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.05);}
    h1{font-size:18px; margin:0 0 10px;}
    p{margin:0 0 14px; color:#4b5563;}
    .price{font-weight:800; font-size:22px; margin:8px 0 16px;}
    #result{margin-top:14px; padding:12px; border-radius:12px; background:#f9fafb; border:1px solid #e5e7eb; white-space:pre-wrap;}
    .hint{font-size:12px; color:#6b7280; margin-top:10px;}
  </style>

  <!-- ✅ PON AQUÍ TU CLIENT ID DE LIVE (PRODUCCIÓN) -->
  <script src="https://www.paypal.com/sdk/js?client-id=AZtz3AcSsDxbzHInTtOoUs4WOIxbp8ev5TIMbG5oE30eAM8sLPQkx6BpM2DM0QSApdk1rUffzN4WwWMq&currency=EUR&intent=capture"></script>
</head>
<body>
  <div class="wrap">
    <h1>Prueba de cobro PayPal</h1>
    <p>Esto crea y captura un pago real de <strong>1,00 EUR</strong>.</p>
    <div class="price">Total: 1,00 €</div>

    <div id="paypal-button-container"></div>

    <div id="result">Estado: esperando pago…</div>
    <div class="hint">
      Nota: si te sale “Sandbox”, no es real. Debe ser LIVE. <br/>
      Y tu web debe estar en HTTPS.
    </div>
  </div>

  <script>
    const result = document.getElementById('result');

    paypal.Buttons({
      style: {
        layout: 'vertical',
        shape: 'pill',
        label: 'paypal'
      },

      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            description: "Prueba Scoot Shop — 1€",
            amount: {
              currency_code: "EUR",
              value: "1.00"
            }
          }]
        });
      },

      onApprove: function(data, actions) {
        result.textContent = "Capturando pago…";
        return actions.order.capture().then(function(details) {
          const payer = details?.payer?.name?.given_name || "Cliente";
          const id = details?.id || data.orderID;
          const status = details?.status || "COMPLETED";
          result.textContent =
            "✅ Pago completado\n" +
            "ID: " + id + "\n" +
            "Estado: " + status + "\n" +
            "Pagador: " + payer + "\n" +
            "Importe: 1.00 EUR";
        });
      },

      onError: function(err) {
        console.error(err);
        result.textContent = "❌ Error: " + (err?.message || "revisa consola y configuración (LIVE/HTTPS).");
      }
    }).render('#paypal-button-container');
  </script>
</body>
</html>
